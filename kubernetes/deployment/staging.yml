apiVersion: v1
kind: Service
metadata:
  name: realfevr-battle-arena-apis-staging
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 3000
  selector:
    app: realfevr-battle-arena-apis-staging
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: realfevr-battle-arena-apis-staging
spec:
  replicas: 3
  selector:
    matchLabels:
      app: realfevr-battle-arena-apis-staging
  template:
    metadata:
      labels:
        app: realfevr-battle-arena-apis-staging
    spec:
      containers:
        - name: realfevr-battle-arena-apis-staging
          image: 'index.docker.io/realfevr/realfevr-battle-arena-apis:staging'
          command:
            - bundle
            - exec
            - puma
            - '-C'
            - config/puma.rb
          ports:
            - containerPort: 3000
          livenessProbe:
            httpGet:
              path: /ping?
              port: 3000
              httpHeaders:
                - name: X-RF-CLIENT-PGAPI-AUTH-TOKEN
                  value: c26aaa52a19935b7d6d6bdee0cd26365
            initialDelaySeconds: 10
            periodSeconds: 300
          resources:
            limits:
              memory: 0.6Gi
            requests:
              memory: 0.3Gi
          env:
            - name: RAILS_ENV
              value: staging
            - name: SEMAPHORE_JOB_ID
              value: $SEMAPHORE_JOB_ID
            - name: RAILS_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: realfevr-battle-arena-apis-secrets
                  key: rails-master-key
          imagePullPolicy: Always
      hostAliases:
        - ip: 10.135.126.103
          hostnames:
            - mongodb-staging
            - redis-staging
      imagePullSecrets:
        - name: docker-cre
---
