    metadata:
      labels:
        app: realfevr-battle-arena-apis-jobs-staging
    spec:
      containers:
        - name: realfevr-battle-arena-apis-jobs-staging
          image: 'index.docker.io/realfevr/realfevr-battle-arena-apis:staging'
          lifecycle:
            preStop:
              exec:
                command:
                  - "/bin/bash"
                  - "-l"
                  - "-c"
                  - "cd /usr/src/realfevr-battle-arena-apis/; for f in tmp/pids/sidekiq*.pid; do bundle exec sidekiqctl stop $f; done"
          command:
            - bundle
            - exec
            - sidekiq
            - '-C'
            - config/sidekiq.yml
          resources:
            limits:
              memory: 0.6Gi
            requests:
              memory: 0.5Gi
          env:
            - name: RAILS_ENV
              value: staging
            - name: SEMAPHORE_JOB_ID
              value: $SEMAPHORE_JOB_ID
            - name: RAILS_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: realfevr-battle-arena-apis-secrets
                  key: rails-master-key
          imagePullPolicy: Always
      hostAliases:
        - ip: 10.135.126.103
          hostnames:
            - mongodb-staging
            - redis-staging
      imagePullSecrets:
        - name: docker-cre
